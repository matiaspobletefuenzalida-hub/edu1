<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Metalófono SEA - Escuela Santa Eugenia</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --navy-blue: #0f3d61; 
            --light-blue: #e1f5fe;
            --white: #ffffff;
            --wood: #5d4037;
            --font-main: 'Nunito', sans-serif;
        }

        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0;
            background: var(--light-blue);
            font-family: var(--font-main);
            height: 100vh; overflow: hidden;
            display: flex; flex-direction: column;
        }

        /* --- HEADER --- */
        header {
            position: relative;
            height: 130px; 
            background-color: var(--white);
            border-bottom: 4px solid var(--navy-blue);
            z-index: 100;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .membrete-escuela { 
            position: absolute; left: 15px; top: 15px;
            height: 90px; width: auto; object-fit: contain;
        }

        .logo-sea { 
            position: absolute; right: 15px; top: 15px;
            height: 90px; width: auto; object-fit: contain;
        }

        #btn-back {
            position: absolute; top: 15px;
            background: #ff5252; color: white; border: none; padding: 8px 18px;
            border-radius: 20px; font-weight: 800; cursor: pointer; 
            box-shadow: 0 4px #c62828; z-index: 110;
        }
        #btn-back:active { transform: translateY(2px); box-shadow: 0 1px #c62828; }

        /* --- MENÚ PRINCIPAL Y ANIMACIÓN DE NUBES --- */
        #menu-overlay {
            position: fixed; inset: 130px 0 0 0; background: var(--light-blue);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 200; gap: 70px;
        }
        #menu-overlay.hidden { display: none; }

        .instruction {
            color: var(--navy-blue); font-size: 1.4rem; font-weight: 900;
            background: white; padding: 8px 25px; border-radius: 50px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: -10px;
        }

        .cloud-btn {
            position: relative; width: 260px; height: 80px;
            background: white; border-radius: 100px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            /* Animación suave y elástica para las nubes */
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease;
        }
        .cloud-btn:hover { 
            transform: scale(1.08) translateY(-5px); 
            box-shadow: 0 15px 25px rgba(0,0,0,0.15);
        }
        .cloud-btn::before, .cloud-btn::after {
            content: ''; position: absolute; background: white; border-radius: 50%;
        }
        .cloud-btn::before { width: 90px; height: 90px; top: -40px; left: 30px; }
        .cloud-btn::after { width: 110px; height: 110px; top: -55px; right: 30px; }
        .cloud-text { position: relative; z-index: 10; color: var(--navy-blue); font-size: 1.6rem; font-weight: 900; }

        /* --- INTERFAZ DE JUEGO --- */
        #game-view { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 15px; }
        
        #hint-text {
            font-size: 1.8rem; font-weight: 900; color: var(--navy-blue);
            margin-bottom: 10px; background: white; padding: 5px 25px; border-radius: 30px;
        }

        #progression { display: flex; gap: 8px; margin-bottom: 15px; }
        .star { font-size: 1.5rem; color: #ccc; }
        .star.now { color: var(--navy-blue); transform: scale(1.4); }
        .star.done { color: #ffca28; }

        #instrument-case {
            width: 100%; max-width: 850px; height: 42vh;
            background: var(--wood); border-radius: 20px;
            padding: 15px; display: flex; gap: 8px;
            border: 6px solid #3e2723; box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        }

        .note-wrapper { flex: 1; display: flex; flex-direction: column; align-items: center; transition: 0.1s; }
        .bar {
            width: 100%; border-radius: 6px; cursor: pointer;
            display: flex; align-items: flex-end; justify-content: center;
            padding-bottom: 15px; box-shadow: inset 2px 2px 5px rgba(255,255,255,0.4), 0 4px 6px rgba(0,0,0,0.3);
        }
        .bar span { color: white; font-weight: 900; font-size: 1.3rem; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
        .note-wrapper.press { transform: translateY(8px); filter: brightness(1.1); }

        .bar[data-n="0"] { background: #f44336; height: 100%; }
        .bar[data-n="1"] { background: #ff9800; height: 93%; }
        .bar[data-n="2"] { background: #ffeb3b; height: 86%; }
        .bar[data-n="3"] { background: #4caf50; height: 79%; }
        .bar[data-n="4"] { background: #2196f3; height: 72%; }
        .bar[data-n="5"] { background: #3f51b5; height: 65%; }
        .bar[data-n="6"] { background: #9c27b0; height: 58%; }
        .bar[data-n="7"] { background: #f44336; height: 51%; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<header>
    <img src="logo_escuela.jpg" alt="Escuela" class="membrete-escuela">
    <img src="logo_header.jpg" alt="SEA" class="logo-sea">
    <button id="btn-back" class="hidden" onclick="location.reload()">VOLVER</button>
</header>

<div id="menu-overlay">
    <p class="instruction">Selecciona una canción:</p>
    <div class="cloud-btn" onclick="start('estrellita')"><div class="cloud-text">⭐ Estrellita</div></div>
    <div class="cloud-btn" onclick="start('jacobo')"><div class="cloud-text">🔔 Fray Jacobo</div></div>
    <div class="cloud-btn" onclick="start('himno')"><div class="cloud-text">🎶 Alegría</div></div>
</div>

<div id="game-view">
    <div id="hint-text">¡A tocar!</div>
    <div id="progression"></div>
    <div id="instrument-case">
        <div class="note-wrapper" data-id="0"><div class="bar" data-n="0"><span>DO</span></div></div>
        <div class="note-wrapper" data-id="1"><div class="bar" data-n="1"><span>RE</span></div></div>
        <div class="note-wrapper" data-id="2"><div class="bar" data-n="2"><span>MI</span></div></div>
        <div class="note-wrapper" data-id="3"><div class="bar" data-n="3"><span>FA</span></div></div>
        <div class="note-wrapper" data-id="4"><div class="bar" data-n="4"><span>SOL</span></div></div>
        <div class="note-wrapper" data-id="5"><div class="bar" data-n="5"><span>LA</span></div></div>
        <div class="note-wrapper" data-id="6"><div class="bar" data-n="6"><span>SI</span></div></div>
        <div class="note-wrapper" data-id="7"><div class="bar" data-n="7"><span>DO</span></div></div>
    </div>
</div>

<script>
    const AudioEngine = {
        ctx: null,
        freqs: [523.25, 587.33, 659.25, 698.46, 783.99, 880.00, 987.77, 1046.50],
        init() { 
            if(!this.ctx) {
                this.ctx = new (window.AudioContext || window.webkitAudioContext)(); 
            }
        },
        play(i) {
            this.init();
            if(this.ctx.state === 'suspended') this.ctx.resume();
            
            const now = this.ctx.currentTime;
            
            // 1. Tono Base Puro (Sine)
            const osc1 = this.ctx.createOscillator();
            const gain1 = this.ctx.createGain();
            osc1.type = 'sine';
            osc1.frequency.setValueAtTime(this.freqs[i], now);
            
            // 2. Resonancia Metálica (Armónico inarmónico característico de placas de metal)
            const osc2 = this.ctx.createOscillator();
            const gain2 = this.ctx.createGain();
            osc2.type = 'sine';
            osc2.frequency.setValueAtTime(this.freqs[i] * 2.756, now); 
            
            // 3. Golpe de la baqueta (Impacto cortísimo y agudo)
            const osc3 = this.ctx.createOscillator();
            const gain3 = this.ctx.createGain();
            osc3.type = 'square';
            osc3.frequency.setValueAtTime(this.freqs[i] * 4, now);

            // --- Envolventes de Volumen ---
            
            // Tono base (Volumen principal, ataque rápido, caída sostenida larga)
            gain1.gain.setValueAtTime(0, now);
            gain1.gain.linearRampToValueAtTime(0.7, now + 0.015);
            gain1.gain.exponentialRampToValueAtTime(0.001, now + 2.5);

            // Resonancia metálica (Menor volumen, decae más rápido)
            gain2.gain.setValueAtTime(0, now);
            gain2.gain.linearRampToValueAtTime(0.25, now + 0.01);
            gain2.gain.exponentialRampToValueAtTime(0.001, now + 1.2);

            // Golpe (Ataque ultra rápido, desaparece casi al instante)
            gain3.gain.setValueAtTime(0, now);
            gain3.gain.linearRampToValueAtTime(0.08, now + 0.005);
            gain3.gain.exponentialRampToValueAtTime(0.001, now + 0.05);

            // Conectar al destino (Altavoces)
            osc1.connect(gain1).connect(this.ctx.destination);
            osc2.connect(gain2).connect(this.ctx.destination);
            osc3.connect(gain3).connect(this.ctx.destination);

            // Iniciar y detener
            osc1.start(now); osc2.start(now); osc3.start(now);
            osc1.stop(now + 2.6); osc2.stop(now + 1.3); osc3.stop(now + 0.1);
        }
    };

    const Songs = {
        estrellita: [[0,0,4,4,5,5,4], [3,3,2,2,1,1,0], [4,4,3,3,2,2,1], [4,4,3,3,2,2,1], [0,0,4,4,5,5,4], [3,3,2,2,1,1,0]],
        jacobo: [[0,1,2,0], [0,1,2,0], [2,3,4], [2,3,4], [4,5,4,3,2,0], [4,5,4,3,2,0], [0,4,0], [0,4,0]],
        himno: [[2,2,3,4,4,3,2,1,0,0,1,2,2,1,1], [2,2,3,4,4,3,2,1,0,0,1,2,1,0,0]]
    };

    let currentSong = [], pIdx = 0, nIdx = 0, active = false;

    function start(key) {
        document.getElementById('menu-overlay').classList.add('hidden');
        document.getElementById('btn-back').classList.remove('hidden');
        currentSong = Songs[key];
        pIdx = 0;
        renderStars();
        playSequence();
    }

    function renderStars() {
        const container = document.getElementById('progression');
        container.innerHTML = '';
        currentSong.forEach((_, i) => {
            const s = document.createElement('span');
            s.className = 'star'; s.id = `s-${i}`; s.innerHTML = '★';
            container.appendChild(s);
        });
    }

    async function playSequence() {
        active = false; nIdx = 0;
        document.getElementById(`s-${pIdx}`).classList.add('now');
        document.getElementById('hint-text').innerText = "🎧 ¡Escucha!";
        await new Promise(r => setTimeout(r, 1000));
        for (let note of currentSong[pIdx]) {
            triggerKey(note, 300);
            await new Promise(r => setTimeout(r, 600));
        }
        active = true;
        document.getElementById('hint-text').innerText = "🎹 ¡Tu turno!";
    }

    function triggerKey(i, time) {
        AudioEngine.play(i);
        const el = document.querySelector(`.note-wrapper[data-id="${i}"]`);
        el.classList.add('press');
        setTimeout(() => el.classList.remove('press'), time);
    }

    document.querySelectorAll('.note-wrapper').forEach(btn => {
        btn.addEventListener('pointerdown', () => {
            if (!active) return;
            const n = parseInt(btn.dataset.id);
            triggerKey(n, 150);
            if (n === currentSong[pIdx][nIdx]) {
                nIdx++;
                if (nIdx === currentSong[pIdx].length) {
                    active = false;
                    document.getElementById(`s-${pIdx}`).className = 'star done';
                    pIdx++;
                    if (pIdx === currentSong.length) {
                        confetti();
                        document.getElementById('hint-text').innerText = "🏆 ¡EXCELENTE!";
                        setTimeout(() => location.reload(), 4000);
                    } else {
                        setTimeout(playSequence, 1000);
                    }
                }
            } else {
                nIdx = 0;
                document.getElementById('hint-text').innerText = "❌ ¡Inténtalo de nuevo!";
            }
        });
    });
</script>
</body>
</html>
